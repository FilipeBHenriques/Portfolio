<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 500" width="1024" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1a"/>
      <stop offset="100%" style="stop-color:#0d1424"/>
    </linearGradient>
    <!-- Tile gradient for all tiles -->
    <linearGradient id="tileGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#141d2e"/>
      <stop offset="100%" style="stop-color:#0e1625"/>
    </linearGradient>
    <!-- Active tile gradient (Q) -->
    <linearGradient id="tileGradActive" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2540"/>
      <stop offset="100%" style="stop-color:#111e35"/>
    </linearGradient>
    <!-- Subtle dot pattern -->
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.8" fill="#1a2540" opacity="0.5"/>
    </pattern>
    <!-- Tile border glow for active -->
    <filter id="glowActive" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Subtle drop shadow for tiles -->
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="125%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <!-- Inner light on top edge -->
    <linearGradient id="topSheen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.08"/>
      <stop offset="30%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="500" fill="url(#bg)"/>
  <rect width="1024" height="500" fill="url(#dots)"/>

  <!-- === TILE Q (active / brightest) === -->
  <g transform="translate(96, 80)" filter="url(#shadow)">
    <rect width="190" height="190" rx="22" ry="22" fill="url(#tileGradActive)"/>
    <!-- border -->
    <rect width="190" height="190" rx="22" ry="22" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.18"/>
    <!-- top sheen -->
    <rect width="190" height="190" rx="22" ry="22" fill="url(#topSheen)"/>
    <!-- Letter Q -->
    <text x="95" y="136" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-weight="700" font-size="110" fill="#ffffff" text-anchor="middle" opacity="0.95">Q</text>
  </g>

  <!-- === TILE U === -->
  <g transform="translate(314, 80)" filter="url(#shadow)">
    <rect width="190" height="190" rx="22" ry="22" fill="url(#tileGrad)"/>
    <rect width="190" height="190" rx="22" ry="22" fill="none" stroke="#ffffff" stroke-width="1.2" opacity="0.10"/>
    <rect width="190" height="190" rx="22" ry="22" fill="url(#topSheen)"/>
    <!-- Letter U -->
    <text x="95" y="136" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-weight="700" font-size="110" fill="#8090b0" text-anchor="middle" opacity="0.85">U</text>
  </g>

  <!-- === TILE I === -->
  <g transform="translate(532, 80)" filter="url(#shadow)">
    <rect width="190" height="190" rx="22" ry="22" fill="url(#tileGrad)"/>
    <rect width="190" height="190" rx="22" ry="22" fill="none" stroke="#ffffff" stroke-width="1.2" opacity="0.10"/>
    <rect width="190" height="190" rx="22" ry="22" fill="url(#topSheen)"/>
    <!-- Letter I -->
    <text x="95" y="136" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-weight="700" font-size="110" fill="#8090b0" text-anchor="middle" opacity="0.85">I</text>
  </g>

  <!-- === TILE T === -->
  <g transform="translate(750, 80)" filter="url(#shadow)">
    <rect width="190" height="190" rx="22" ry="22" fill="url(#tileGrad)"/>
    <rect width="190" height="190" rx="22" ry="22" fill="none" stroke="#ffffff" stroke-width="1.2" opacity="0.10"/>
    <rect width="190" height="190" rx="22" ry="22" fill="url(#topSheen)"/>
    <!-- Letter T -->
    <text x="95" y="136" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-weight="700" font-size="110" fill="#8090b0" text-anchor="middle" opacity="0.85">T</text>
  </g>

  <!-- Tagline -->
  <text x="512" y="336" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-weight="400" font-size="22" fill="#4a5e82" text-anchor="middle" letter-spacing="4">CASINO GAME TRACKER</text>

  <!-- Bottom thin accent line -->
  <rect x="412" y="366" width="200" height="1.5" rx="1" fill="#2a3a5e" opacity="0.6"/>
</svg>
