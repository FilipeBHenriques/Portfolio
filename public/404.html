<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <script>
    // GitHub Pages SPA redirect: store the path and redirect to index
    var path = window.location.pathname.replace('/Portfolio', '') || '/';
    sessionStorage.setItem('redirect', path + window.location.search);
    window.location.replace('/Portfolio/');
  </script>
</head>
<body></body>
</html>
